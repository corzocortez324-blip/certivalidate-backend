openapi: 3.0.3
info:
  title: CertiValidate API
  version: 1.1.0
  description: >
    API REST para emisión, verificación y gestión de certificados digitales con hash SHA-256.

    Autenticación

    La mayoría de endpoints requieren un JWT en el header `Authorization: Bearer <token>`.
    Los tokens se obtienen en `/api/auth/login` y se renuevan con `/api/auth/refresh`.

    Control de acceso

    El acceso es por institución. Un usuario solo puede ver y modificar recursos de
    las instituciones a las que pertenece, según su rol (admin, editor, lector).

servers:
  - url: http://localhost:3000
    description: Desarrollo local

tags:
  - name: Sistema
  - name: Auth
  - name: Certificados
  - name: Estudiantes
  - name: Instituciones
  - name: Plantillas
  - name: Auditoría
  - name: Usuarios

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        statusCode: { type: integer, example: 200 }
        message: { type: string }
        data: { type: object }
        timestamp: { type: string, format: date-time }

    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer }
        message: { type: string }
        timestamp: { type: string, format: date-time }

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/ApiError'
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }

    Tokens:
      type: object
      properties:
        token: { type: string, description: "Access token JWT (1h por defecto)" }
        refreshToken: { type: string, description: "Refresh token JWT (7d por defecto)" }
        usuario:
          type: object
          properties:
            id: { type: string, format: uuid }
            nombre: { type: string }
            email: { type: string, format: email }

    Usuario:
      type: object
      properties:
        id: { type: string, format: uuid }
        nombre: { type: string }
        apellido: { type: string }
        email: { type: string, format: email }
        activo: { type: boolean }
        ultimo_acceso: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    UsuarioConRol:
      allOf:
        - $ref: '#/components/schemas/Usuario'
        - type: object
          properties:
            rol:
              type: string
              enum: [admin, editor, lector]
              nullable: true
              description: Rol principal del usuario en la institución

    Institucion:
      type: object
      properties:
        id: { type: string, format: uuid }
        nombre: { type: string }
        dominio: { type: string, nullable: true }
        logo_url: { type: string, nullable: true }
        activa: { type: boolean }
        created_at: { type: string, format: date-time }

    Estudiante:
      type: object
      properties:
        id: { type: string, format: uuid }
        institucion_id: { type: string, format: uuid }
        nombre: { type: string }
        apellido: { type: string }
        documento: { type: string }
        email: { type: string, format: email, nullable: true }
        created_at: { type: string, format: date-time }

    Certificado:
      type: object
      properties:
        id: { type: string, format: uuid }
        codigo_unico: { type: string }
        hash_sha256: { type: string }
        estado: { type: string, enum: [valido, revocado] }
        fecha_emision: { type: string, format: date-time }
        fecha_expiracion: { type: string, format: date-time, nullable: true }
        estudiante_id: { type: string, format: uuid }
        institucion_id: { type: string, format: uuid }
        plantilla_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    PlantillaCertificado:
      type: object
      properties:
        id: { type: string, format: uuid }
        institucion_id: { type: string, format: uuid }
        nombre: { type: string }
        template_html: { type: string }
        version: { type: integer }
        activa: { type: boolean }
        created_at: { type: string, format: date-time }

    PaginatedResponse:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }

  parameters:
    PageParam:
      in: query
      name: page
      schema: { type: integer, default: 1, minimum: 1 }
    LimitParam:
      in: query
      name: limit
      schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
    UUIDPath:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  responses:
    ValidationError:
      description: Error de validación de entrada
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }
    Unauthorized:
      description: No autenticado o token inválido/expirado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Forbidden:
      description: Sin permiso para acceder a este recurso
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

paths:
  /health:
    get:
      tags: [Sistema]
      summary: Estado del servidor y conexión a BD
      responses:
        '200':
          description: Servidor online y BD conectada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, example: ok }
                          version: { type: string, example: 1.1.0 }
                          uptime: { type: integer, description: Segundos en ejecución }
                          db: { type: string, enum: [connected, disconnected] }
        '503':
          description: BD no disponible

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registrar nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, email, password]
              properties:
                nombre: { type: string, minLength: 3 }
                apellido: { type: string }
                email: { type: string, format: email }
                password:
                  type: string
                  minLength: 6
                  description: Debe contener mayúscula, minúscula y número
      responses:
        '201':
          description: Usuario creado correctamente
        '400': { $ref: '#/components/responses/ValidationError' }
        '409':
          description: Email ya registrado

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Tokens' }
        '401':
          description: Credenciales inválidas

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token usando refresh token
      description: El refresh token se rota — el anterior queda revocado inmediatamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Tokens' }
        '401':
          description: Refresh token inválido, expirado o ya rotado

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión y revocar refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Sesión cerrada
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/perfil:
    get:
      tags: [Auth]
      summary: Obtener perfil del usuario autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil del usuario (sin password_hash)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Usuario' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [Auth]
      summary: Actualizar nombre, apellido o email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                apellido: { type: string }
                email: { type: string, format: email }
      responses:
        '200': { description: Perfil actualizado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: Email ya en uso }

  /api/auth/perfil/password:
    put:
      tags: [Auth]
      summary: Cambiar contraseña e invalidar todas las sesiones activas
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 6 }
      responses:
        '200': { description: Contraseña cambiada. Todas las sesiones fueron invalidadas. }
        '401': { description: Contraseña actual incorrecta }

  /api/certificados/verificar:
    post:
      tags: [Certificados]
      summary: Verificar certificado por código o hash (público — sin autenticación)
      description: Registra la verificación en el historial. Acepta código único o hash SHA-256.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                codigo: { type: string, description: Código único del certificado }
                hash: { type: string, description: Hash SHA-256 completo }
      responses:
        '200':
          description: Resultado de verificación
          content:
            application/json:
              example:
                success: true
                statusCode: 200
                data:
                  codigo_unico: A1B2C3D4
                  estado: valido
                  mensaje: Certificado verificado correctamente
                  fecha_emision: "2026-04-01T00:00:00Z"
                  estudiante: { nombre: Juan, apellido: Pérez }
                  institucion: { nombre: Universidad Cesar }
        '400': { description: Se requiere código o hash }

  /api/certificados/emitir:
    post:
      tags: [Certificados]
      summary: Emitir un nuevo certificado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estudiante_id, institucion_id, plantilla_id]
              properties:
                estudiante_id: { type: string, format: uuid }
                institucion_id: { type: string, format: uuid }
                plantilla_id: { type: string, format: uuid }
      responses:
        '201':
          description: Certificado emitido con hash SHA-256
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Certificado' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/certificados/listar:
    get:
      tags: [Certificados]
      summary: Listar certificados con paginación y filtros
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: estado
          schema: { type: string, enum: [valido, revocado, expirado] }
        - in: query
          name: institucion_id
          schema: { type: string, format: uuid }
        - in: query
          name: estudiante_id
          schema: { type: string, format: uuid }
        - in: query
          name: search
          schema: { type: string }
          description: Busca en código, hash, nombre/apellido/documento del estudiante, plantilla
      responses:
        '200':
          description: Lista paginada de certificados
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/certificados/descargar/{id}:
    get:
      tags: [Certificados]
      summary: Descargar certificado en PDF
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          description: Archivo PDF del certificado
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/certificados/{id}:
    get:
      tags: [Certificados]
      summary: Detalle de un certificado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          description: Certificado con estudiante, institución y plantilla incluidos
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/certificados/{id}/verificaciones:
    get:
      tags: [Certificados]
      summary: Historial paginado de verificaciones públicas del certificado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200': { description: Lista paginada de verificaciones (ip, user_agent, resultado, fecha) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/certificados/{id}/revocaciones:
    get:
      tags: [Certificados]
      summary: Historial paginado de revocaciones del certificado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200': { description: Lista paginada de revocaciones con usuario revocador }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/certificados/{id}/revocar:
    post:
      tags: [Certificados]
      summary: Revocar un certificado
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motivo_codigo]
              properties:
                motivo_codigo: { type: string, example: ERROR_EMISION }
                motivo_detalle: { type: string, maxLength: 500 }
      responses:
        '200': { description: Certificado revocado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: El certificado ya estaba revocado }

  /api/estudiantes:
    get:
      tags: [Estudiantes]
      summary: Listar estudiantes de las instituciones del usuario
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: institucion_id
          schema: { type: string, format: uuid }
        - in: query
          name: search
          schema: { type: string, description: Busca en nombre, apellido, documento, email }
      responses:
        '200': { description: Lista paginada de estudiantes }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Estudiantes]
      summary: Crear un nuevo estudiante
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [institucion_id, nombre, apellido, documento]
              properties:
                institucion_id: { type: string, format: uuid }
                nombre: { type: string, minLength: 2 }
                apellido: { type: string, minLength: 2 }
                documento: { type: string, minLength: 4 }
                email: { type: string, format: email }
      responses:
        '201': { description: Estudiante creado }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/estudiantes/{id}:
    get:
      tags: [Estudiantes]
      summary: Detalle de un estudiante
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200': { description: Estudiante encontrado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Estudiantes]
      summary: Actualizar datos del estudiante (todos los campos opcionales)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                apellido: { type: string }
                documento: { type: string }
                email: { type: string, format: email }
                institucion_id: { type: string, format: uuid, description: Mover a otra institución propia }
      responses:
        '200': { description: Estudiante actualizado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Estudiantes]
      summary: Eliminar estudiante (requiere no tener certificados)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200': { description: Estudiante eliminado }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: El estudiante tiene certificados asociados y no puede eliminarse }

  /api/instituciones:
    get:
      tags: [Instituciones]
      summary: Listar instituciones a las que pertenece el usuario
      security:
        - bearerAuth: []
      responses:
        '200': { description: Lista de instituciones }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Instituciones]
      summary: Crear institución (el creador queda automáticamente como admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre]
              properties:
                nombre: { type: string, minLength: 3 }
                dominio: { type: string }
                logo_url: { type: string, format: uri }
                activa: { type: boolean, default: true }
      responses:
        '201': { description: Institución creada }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/instituciones/{id}:
    get:
      tags: [Instituciones]
      summary: Detalle de una institución con conteos (_count)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200': { description: Institución con _count.estudiantes, _count.plantillas, _count.certificados }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [Instituciones]
      summary: Actualizar datos de la institución
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                dominio: { type: string }
                logo_url: { type: string, format: uri }
                activa: { type: boolean }
      responses:
        '200': { description: Institución actualizada }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/instituciones/{id}/desactivar:
    patch:
      tags: [Instituciones]
      summary: Desactivar una institución
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200': { description: Institución desactivada }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/instituciones/{id}/estadisticas:
    get:
      tags: [Instituciones]
      summary: Estadísticas de la institución
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          description: Conteos de estudiantes, certificados (válidos/revocados/expirados) y verificaciones públicas
          content:
            application/json:
              example:
                data:
                  institucion_id: uuid
                  estudiantes: 42
                  plantillas: 3
                  certificados: 120
                  certificados_validos: 115
                  certificados_revocados: 5
                  certificados_expirados: 0
                  verificaciones_publicas: 350
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/plantillas:
    get:
      tags: [Plantillas]
      summary: Listar plantillas activas de las instituciones del usuario
      security:
        - bearerAuth: []
      responses:
        '200': { description: Lista de plantillas activas }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Plantillas]
      summary: Crear una nueva plantilla de certificado
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [institucion_id, nombre, template_html, version]
              properties:
                institucion_id: { type: string, format: uuid }
                nombre: { type: string, minLength: 3 }
                template_html: { type: string, minLength: 10 }
                version: { type: integer, minimum: 1 }
                activa: { type: boolean, default: true }
      responses:
        '201': { description: Plantilla creada }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/plantillas/{id}:
    get:
      tags: [Plantillas]
      summary: Detalle de una plantilla
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200': { description: Plantilla encontrada }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Plantillas]
      summary: Actualizar plantilla existente
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                template_html: { type: string }
                version: { type: integer, minimum: 1 }
                activa: { type: boolean }
      responses:
        '200': { description: Plantilla actualizada }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/auditoria:
    get:
      tags: [Auditoría]
      summary: Listar log de auditoría (filtrado por instituciones del usuario)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: entidad
          schema: { type: string, example: Certificado }
        - in: query
          name: accion
          schema: { type: string, example: EMITIR_CERTIFICADO }
        - in: query
          name: usuario_id
          schema: { type: string, format: uuid }
        - in: query
          name: fecha_desde
          schema: { type: string, format: date }
        - in: query
          name: fecha_hasta
          schema: { type: string, format: date }
      responses:
        '200': { description: Lista paginada de registros de auditoría }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/auditoria/{entidad}/{entidad_id}:
    get:
      tags: [Auditoría]
      summary: Historial de auditoría de una entidad específica
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: entidad
          required: true
          schema: { type: string, example: Certificado }
          description: Tipo de entidad (Certificado, Estudiante, Institucion, Plantilla, Usuario)
        - in: path
          name: entidad_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Historial de auditoría de la entidad }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ─── Usuarios ────────────────────────────────────────────────────────────────

  /api/usuarios:
    get:
      tags: [Usuarios]
      summary: Listar usuarios (solo admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: search
          schema: { type: string }
          description: Buscar por nombre, apellido o email
      responses:
        '200':
          description: Lista paginada de usuarios
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PaginatedResponse'
                          - type: object
                            properties:
                              usuarios:
                                type: array
                                items: { $ref: '#/components/schemas/UsuarioConRol' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      tags: [Usuarios]
      summary: Crear usuario (solo admin)
      description: Crea un nuevo usuario y lo asigna a la institución del admin con el rol indicado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, email, password]
              properties:
                nombre:   { type: string, example: Ana }
                apellido: { type: string, example: Martínez }
                email:    { type: string, format: email, example: ana@universidad.edu.co }
                password: { type: string, format: password, minLength: 8 }
                rol:
                  type: string
                  enum: [admin, editor, lector]
                  default: lector
      responses:
        '201':
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UsuarioConRol' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { description: El email ya está registrado }

  /api/usuarios/{id}:
    get:
      tags: [Usuarios]
      summary: Obtener usuario por ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200':
          description: Usuario obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UsuarioConRol' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    put:
      tags: [Usuarios]
      summary: Actualizar usuario
      description: Permite cambiar nombre, apellido, email, estado activo y rol.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:   { type: string }
                apellido: { type: string }
                email:    { type: string, format: email }
                activo:   { type: boolean }
                rol:      { type: string, enum: [admin, editor, lector] }
      responses:
        '200':
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UsuarioConRol' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { description: El email ya está en uso }

    delete:
      tags: [Usuarios]
      summary: Eliminar usuario (soft delete)
      description: Marca el usuario como eliminado y lo desactiva. No se puede eliminar la propia cuenta.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UUIDPath'
      responses:
        '200': { description: Usuario eliminado correctamente }
        '400': { description: No puedes eliminar tu propia cuenta }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
