services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://certivalidate:certivalidate@db:5432/certivalidate
      DIRECT_URL: postgresql://certivalidate:certivalidate@db:5432/certivalidate
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PUBLIC_VERIFY_URL: ${PUBLIC_VERIFY_URL:-http://localhost:3000/verificar}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: certivalidate
      POSTGRES_PASSWORD: certivalidate
      POSTGRES_DB: certivalidate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certivalidate"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
